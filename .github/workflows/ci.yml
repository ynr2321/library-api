# CI pipeline to build solution and run tests
# Triggers on PRs targeting main: new commits, reopened, or draft -> open
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  ci:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Library/Library.slnx

      - name: Build
        run: dotnet build Library/Library.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Library/Library.slnx --no-build --configuration Release --verbosity normal